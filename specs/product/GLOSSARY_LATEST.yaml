terms:
  - term: Domain rule
    definition: Per-hostname settings override (engine, selectors, summary, subtitles).
  - term: Display mode
    definition: How translated text is shown — replace, append, or hover.
  - term: Pre-check rule
    definition: Regex filter that skips translation for matching text before engine call.
  - term: Short-text fallback
    definition: When AI engine is primary, short strings route to a cheaper/faster engine.
  - term: Page translation job
    definition: Content-script pipeline that discovers, batches, and applies page translations.
  - term: Product tokens
    definition: Live CSS variables under --fox-* in src/common/common.css.
  - term: solo-git
    definition: Integrate mode that lands via local squash/push without mandatory PR.
